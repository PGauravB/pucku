<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BROADCAST — Live Voice Channel</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e63946;
    --accent2: #ffd60a;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --live: #39e67a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.3;
  }

  header {
    width: 100%;
    padding: 24px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem;
    letter-spacing: 6px;
    color: var(--text);
    line-height: 1;
  }

  .logo span { color: var(--accent); }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(57,230,122,0.1);
    border: 1px solid var(--live);
    border-radius: 4px;
    padding: 5px 12px;
    font-size: 0.65rem;
    letter-spacing: 3px;
    color: var(--live);
    font-weight: 700;
  }

  .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--live);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .status-bar {
    margin-left: auto;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }

  .status-dot.connected { background: var(--live); }

  main {
    width: 100%;
    max-width: 780px;
    padding: 40px 24px 60px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    position: relative;
    z-index: 1;
  }

  .compose {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  .compose::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .compose-label {
    font-size: 0.6rem;
    letter-spacing: 4px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    line-height: 1.6;
    resize: none;
    padding: 8px 0 14px;
    outline: none;
    min-height: 80px;
    transition: border-color 0.2s;
  }

  textarea::placeholder { color: var(--muted); }
  textarea:focus { border-bottom-color: var(--accent); }

  .compose-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
  }

  .char-count { font-size: 0.65rem; color: var(--muted); letter-spacing: 1px; }
  .char-count.warn { color: var(--accent); }

  .send-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 4px;
    padding: 12px 32px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .send-btn:hover:not(:disabled) {
    background: #ff4757;
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(230,57,70,0.4);
  }

  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .controls-row {
    display: flex;
    justify-content: flex-end;
  }

  .tts-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
  }

  .toggle-switch {
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle-switch.on { background: var(--live); }

  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }

  .toggle-switch.on::after { transform: translateX(16px); }

  .feed-header {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.6rem;
    letter-spacing: 4px;
    color: var(--muted);
  }

  .feed-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Feed container - normal column order, we'll control visual order via JavaScript */
  .feed {
    display: flex;
    flex-direction: column;
    gap: 12px;
    max-height: 60vh;
    overflow-y: auto;
    padding: 4px 0;
    scroll-behavior: smooth;
  }

  .msg-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    padding: 16px 20px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    animation: slideIn 0.35s cubic-bezier(0.16,1,0.3,1);
    position: relative;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-card.mine { border-left-color: var(--accent2); }

  .msg-card.speaking {
    border-left-color: var(--live);
    box-shadow: 0 0 0 1px rgba(57,230,122,0.15), 0 0 20px rgba(57,230,122,0.05);
  }

  .msg-card.speaking::after {
    content: '▶ SPEAKING';
    position: absolute;
    top: 10px; right: 14px;
    font-size: 0.55rem;
    letter-spacing: 3px;
    color: var(--live);
    font-weight: 700;
  }

  .msg-icon {
    width: 32px; height: 32px;
    background: rgba(230,57,70,0.12);
    border: 1px solid rgba(230,57,70,0.25);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-body { flex: 1; min-width: 0; }

  .msg-meta {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 6px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .you-tag { color: var(--accent2); font-weight: 700; }

  .msg-text {
    font-size: 0.95rem;
    line-height: 1.6;
    word-break: break-word;
  }

  .wave-bars {
    display: none;
    gap: 3px;
    align-items: center;
    height: 16px;
  }

  .msg-card.speaking .wave-bars { display: flex; }

  .wave-bars span {
    display: inline-block;
    width: 3px;
    background: var(--live);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }

  .wave-bars span:nth-child(1) { animation-delay: 0s;    height: 8px;  }
  .wave-bars span:nth-child(2) { animation-delay: 0.1s;  height: 14px; }
  .wave-bars span:nth-child(3) { animation-delay: 0.2s;  height: 10px; }
  .wave-bars span:nth-child(4) { animation-delay: 0.3s;  height: 6px;  }
  .wave-bars span:nth-child(5) { animation-delay: 0.15s; height: 12px; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); opacity: 0.6; }
    50%       { transform: scaleY(1);   opacity: 1;   }
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 0.75rem;
    letter-spacing: 2px;
    border: 1px dashed var(--border);
  }

  .empty-state .icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.4; }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--live);
    color: #000;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 12px 24px;
    border-radius: 2px;
    z-index: 999;
    transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    white-space: nowrap;
  }

  .toast.show  { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--accent); color: #fff; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">BROAD<span>CAST</span></div>
  <div class="live-badge"><div class="live-dot"></div>LIVE</div>
  <div class="status-bar">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">CONNECTING...</span>
  </div>
</header>

<main>
  <div class="compose">
    <div class="compose-label">// TRANSMIT MESSAGE</div>
    <textarea id="msgInput" placeholder="type something... everyone will hear it." maxlength="300" rows="3"></textarea>
    <div class="compose-footer">
      <span class="char-count" id="charCount">0 / 300</span>
      <button class="send-btn" id="sendBtn">BROADCAST</button>
    </div>
  </div>

  <div class="controls-row">
    <label class="tts-toggle" id="ttsToggle">
      <div class="toggle-switch on" id="ttsSwitch"></div>
      AUTO-SPEAK (OTHERS ONLY)
    </label>
  </div>

  <div class="feed-header">LIVE FEED — NEWEST FIRST</div>
  <div class="feed" id="feed">
    <div class="empty-state" id="emptyState">
      <div class="icon">📡</div>
      LOADING...
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore, collection, addDoc,
    query, orderBy, limit, onSnapshot, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── Init ──────────────────────────────────────
  const app = initializeApp({
    apiKey:            "AIzaSyA3fWq3U4yXfH7Lq1VmMFOWC285t_tsbVg",
    authDomain:        "puchku-740b1.firebaseapp.com",
    projectId:         "puchku-740b1",
    storageBucket:     "puchku-740b1.firebasestorage.app",
    messagingSenderId: "777932737041",
    appId:             "1:777932737041:web:214ea01432011da9bbffb0"
  });

  const db  = getFirestore(app);
  const col = collection(db, "broadcasts");

  // Unique session tag so you can see which messages are yours
  const sessionId = crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2);

  // ── DOM ───────────────────────────────────────
  const feed       = document.getElementById('feed');
  const msgInput   = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');
  const charCount  = document.getElementById('charCount');
  const emptyState = document.getElementById('emptyState');
  const ttsSwitch  = document.getElementById('ttsSwitch');
  const ttsToggle  = document.getElementById('ttsToggle');
  const toast      = document.getElementById('toast');
  const statusDot  = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  // ── State ─────────────────────────────────────
  let ttsEnabled   = true;
  let speakQueue   = [];
  let isSpeaking   = false;
  let currentCard  = null;
  let initialLoad  = true;
  const rendered   = new Set();
  let isUserScrolling = false;
  let scrollTimeout = null;

  // ── Track user scroll to auto-scroll only when they're at top ──
  feed.addEventListener('scroll', () => {
    isUserScrolling = true;
    if (scrollTimeout) clearTimeout(scrollTimeout);
    scrollTimeout = setTimeout(() => {
      isUserScrolling = false;
    }, 150);
  });

  // ── TTS toggle ────────────────────────────────
  ttsToggle.addEventListener('click', () => {
    ttsEnabled = !ttsEnabled;
    ttsSwitch.classList.toggle('on', ttsEnabled);
    if (!ttsEnabled) {
      window.speechSynthesis.cancel();
      speakQueue = [];
      isSpeaking = false;
      if (currentCard) { currentCard.classList.remove('speaking'); currentCard = null; }
    }
    showToast(ttsEnabled ? 'AUTO-SPEAK ON (others only)' : 'AUTO-SPEAK OFF');
  });

  // ── Char count ────────────────────────────────
  msgInput.addEventListener('input', () => {
    const n = msgInput.value.length;
    charCount.textContent = `${n} / 300`;
    charCount.classList.toggle('warn', n > 260);
  });

  // ── Send ──────────────────────────────────────
  sendBtn.addEventListener('click', sendMsg);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendMsg();
  });

  async function sendMsg() {
    const text = msgInput.value.trim();
    if (!text) return;
    sendBtn.disabled = true;
    sendBtn.textContent = 'SENDING...';
    try {
      await addDoc(col, { text, session: sessionId, createdAt: serverTimestamp() });
      msgInput.value = '';
      charCount.textContent = '0 / 300';
      charCount.classList.remove('warn');
    } catch (err) {
      console.error(err);
      showToast('FIRESTORE ERROR: ' + (err.code || err.message), true);
    }
    sendBtn.textContent = 'BROADCAST';
    sendBtn.disabled = false;
  }

  // ── Helper: Insert message at the top (newest first) ──
  function insertMessageAtTop(card, shouldAutoScroll = true) {
    // Remove empty state if present
    if (emptyState.parentNode) {
      emptyState.remove();
    }
    
    // Insert at the beginning of the feed (top position in DOM)
    feed.insertBefore(card, feed.firstChild);
    
    // Auto-scroll to top only if user hasn't manually scrolled away
    if (shouldAutoScroll && !isUserScrolling) {
      // Small delay to ensure DOM is updated
      setTimeout(() => {
        feed.scrollTo({ top: 0, behavior: 'smooth' });
      }, 50);
    }
  }

  // ── Query: order by createdAt DESCENDING to get newest first from Firestore ──
  const q = query(col, orderBy('createdAt', 'desc'), limit(60));

  onSnapshot(q,
    snapshot => {
      statusDot.classList.add('connected');
      statusText.textContent = 'CONNECTED';

      if (initialLoad) {
        initialLoad = false;
        // Clear feed and empty state
        feed.innerHTML = '';
        rendered.clear();

        if (snapshot.empty) {
          emptyState.innerHTML = '<div class="icon">📡</div>NO TRANSMISSIONS YET<br>BE THE FIRST TO BROADCAST';
          feed.appendChild(emptyState);
        } else {
          // For initial load, we need to add messages in order (newest first)
          // So we iterate in the order they come from Firestore (already newest first)
          snapshot.docs.forEach(doc => {
            rendered.add(doc.id);
            const d = doc.data();
            const card = createCard(d.text, d.createdAt, d.session === sessionId);
            feed.appendChild(card);
          });
          // Scroll to top to show newest messages
          feed.scrollTop = 0;
        }
        return;
      }

      // Live updates: only handle new documents (added)
      snapshot.docChanges().forEach(change => {
        if (change.type !== 'added') return;
        const doc = change.doc;
        if (rendered.has(doc.id)) return;
        rendered.add(doc.id);

        const d = doc.data();
        const isMine = d.session === sessionId;
        const card = createCard(d.text, d.createdAt, isMine);

        // Check if user is near the top before auto-scrolling
        const isNearTop = feed.scrollTop <= 100;
        
        // Insert new message at the top
        if (emptyState.parentNode) {
          emptyState.remove();
        }
        feed.insertBefore(card, feed.firstChild);
        
        // Auto-scroll to top only if user is already near the top or hasn't scrolled away
        if (!isUserScrolling && isNearTop) {
          setTimeout(() => {
            feed.scrollTo({ top: 0, behavior: 'smooth' });
          }, 50);
        }

        // Only speak if message is NOT from current user
        if (ttsEnabled && !isMine) {
          queueSpeak(d.text, card);
        }
      });
    },
    err => {
      console.error(err);
      statusDot.classList.remove('connected');
      statusText.textContent = 'ERROR';
      showToast('CONNECTION ERROR — CHECK FIRESTORE RULES', true);
    }
  );

  // ── TTS queue ─────────────────────────────────
  function queueSpeak(text, card) {
    speakQueue.push({ text, card });
    if (!isSpeaking) processQueue();
  }

  function processQueue() {
    if (!speakQueue.length || !ttsEnabled) { 
      isSpeaking = false; 
      return; 
    }
    isSpeaking = true;
    const { text, card } = speakQueue.shift();

    // Remove speaking class from previous card
    if (currentCard && currentCard !== card) {
      currentCard.classList.remove('speaking');
    }
    card.classList.add('speaking');
    currentCard = card;

    const utter = new SpeechSynthesisUtterance(text);
    utter.rate  = 0.95;
    utter.pitch = 1.05;
    utter.lang  = 'en-US';
    
    utter.onend   = () => { 
      if (currentCard) currentCard.classList.remove('speaking'); 
      currentCard = null; 
      isSpeaking = false; 
      processQueue(); 
    };
    
    utter.onerror = (event) => {
      if (event.error !== 'canceled') {
        console.warn('Speech error:', event.error);
      }
      if (currentCard) currentCard.classList.remove('speaking');
      currentCard = null;
      isSpeaking = false;
      processQueue();
    };
    
    window.speechSynthesis.speak(utter);
  }

  // ── Card Creator ──────────────────────────────────────
  const emojis = ['📡','🔊','📢','📣','🎙️','💬'];

  function formatTime(ts) {
    if (!ts || !ts.toDate) return 'just now';
    const date = ts.toDate();
    const now = new Date();
    const diffMs = now - date;
    const diffSec = Math.floor(diffMs / 1000);
    
    if (diffSec < 10) return 'just now';
    if (diffSec < 60) return `${diffSec}s ago`;
    if (diffSec < 3600) return `${Math.floor(diffSec / 60)}m ago`;
    if (diffSec < 86400) return `${Math.floor(diffSec / 3600)}h ago`;
    return date.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  }

  function createCard(text, ts, isMine) {
    const card = document.createElement('div');
    card.className = 'msg-card' + (isMine ? ' mine' : '');
    
    const timeStr = formatTime(ts);

    card.innerHTML = `
      <div class="msg-icon">${emojis[Math.floor(Math.random()*emojis.length)]}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span>${timeStr}</span>
          ${isMine ? '<span class="you-tag">YOU</span>' : '<span class="you-tag" style="color: var(--live);">RECEIVED</span>'}
          <div class="wave-bars"><span></span><span></span><span></span><span></span><span></span></div>
        </div>
        <div class="msg-text">${esc(text)}</div>
      </div>`;
    return card;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Toast ─────────────────────────────────────
  function showToast(msg, isErr = false) {
    toast.textContent = msg;
    toast.className = 'toast show' + (isErr ? ' error' : '');
    setTimeout(() => toast.classList.remove('show'), 2600);
  }
</script>
</body>
</html>
