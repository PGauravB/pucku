<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  margin: 5px 0;
  padding: 8px 12px;
  background: #1e293b;
  border-radius: 10px;
  width: fit-content;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #020617;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  background: #38bdf8;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="msgInput" placeholder="Type message..." />
  <button onclick="sendMsg()">Send</button>
</div>

<script type="module">
// 🔥 Firebase config (REPLACE THIS)
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyA3fWq3U4yXfH7Lq1VmMFOWC285t_tsbVg",
    authDomain: "puchku-740b1.firebaseapp.com",
    projectId: "puchku-740b1",
    storageBucket: "puchku-740b1.firebasestorage.app",
    messagingSenderId: "777932737041",
    appId: "1:777932737041:web:214ea01432011da9bbffb0"
  };

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chatDiv = document.getElementById("chat");

// Listen for messages (REALTIME)
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
  chatDiv.innerHTML = "";
  snapshot.forEach(doc => {
    const msg = doc.data();
    const div = document.createElement("div");
    div.className = "msg";
    div.textContent = msg.text;
    chatDiv.appendChild(div);
  });
  chatDiv.scrollTop = chatDiv.scrollHeight;
});

// Send message
window.sendMsg = async function () {
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text: text,
    time: Date.now()
  });

  input.value = "";
};

</script>

</body>
</html>
