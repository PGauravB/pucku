<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gaurav ❤️ Bidhisha</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #000; --surface: #121212; --surface2: #1e1e1e;
  --border: #2a2a2a; --text: #f5f5f5; --muted: #888;
  --grad: linear-gradient(135deg,#833ab4 0%,#fd1d1d 50%,#fcb045 100%);
  --them: #262626; --r: 22px;
}
html,body { height:100%; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; overflow:hidden; }

/* ── LOGIN ── */
#loginScreen {
  position:fixed; inset:0; background:#000;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:0; z-index:1000; animation:fadeIn .5s ease;
}
.ll { font-size:56px; margin-bottom:10px; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
.lt {
  font-size:30px; font-weight:800;
  background:var(--grad); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text;
  margin-bottom:6px; letter-spacing:-.5px;
}
.ls { color:var(--muted); font-size:14px; margin-bottom:36px; }
.lcard {
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:28px; width:320px;
  display:flex; flex-direction:column; gap:16px;
}
.llbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
.liw { position:relative; }
.linput {
  width:100%; background:var(--surface2); border:1.5px solid var(--border);
  border-radius:12px; padding:14px 44px 14px 16px; color:var(--text);
  font-size:15px; outline:none; transition:border-color .2s; font-family:inherit;
}
.linput:focus { border-color:#833ab4; }
.eyeb {
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
  background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer;
}
.lbtn {
  background:var(--grad); border:none; border-radius:12px;
  padding:14px; color:#fff; font-size:15px; font-weight:700; cursor:pointer;
  transition:opacity .2s,transform .15s; letter-spacing:.3px;
}
.lbtn:hover{opacity:.9} .lbtn:active{transform:scale(.98)}
.lerr { color:#ff4d4d; font-size:13px; text-align:center; min-height:18px; animation:shake .4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── APP ── */
#app {
  display:none; flex-direction:column; height:100dvh;
  max-width:480px; margin:0 auto;
  border-left:1px solid var(--border); border-right:1px solid var(--border);
}
#app.on { display:flex; }

/* HEADER */
#hdr {
  display:flex; align-items:center; gap:12px;
  padding:12px 16px 10px;
  background:rgba(0,0,0,.9); backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border); flex-shrink:0; z-index:5;
}
.av {
  width:42px; height:42px; border-radius:50%; background:var(--grad);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; font-weight:700; color:#fff; flex-shrink:0; position:relative;
}
.av.sm { width:26px; height:26px; font-size:11px; }
.odot {
  width:11px; height:11px; background:#3bc748;
  border-radius:50%; border:2px solid #000;
  position:absolute; bottom:1px; right:1px;
}
.hi { flex:1; }
.hn { font-size:15px; font-weight:700; }
.hs { font-size:12px; color:var(--muted); margin-top:1px; }
.hicons { display:flex; gap:18px; }
.hbtn { background:none; border:none; color:var(--text); font-size:22px; cursor:pointer; padding:0; }

/* CHAT */
#chat {
  flex:1; overflow-y:auto; padding:12px 14px 8px;
  display:flex; flex-direction:column; gap:2px; scroll-behavior:smooth;
}
#chat::-webkit-scrollbar{width:0}

.ddiv {
  text-align:center; font-size:11px; color:var(--muted);
  margin:12px 0 6px; position:relative;
}
.ddiv::before,.ddiv::after {
  content:''; position:absolute; top:50%; width:28%;
  height:1px; background:var(--border);
}
.ddiv::before{left:0} .ddiv::after{right:0}

/* ROW */
.row {
  display:flex; align-items:flex-end; gap:8px;
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1) both;
}
.row.me { flex-direction:row-reverse; }
.row.me .av.sm { display:none; }
@keyframes popIn {
  from{opacity:0;transform:scale(.85) translateY(6px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

/* BUBBLE */
.bbl {
  max-width:68%; padding:10px 14px; border-radius:var(--r);
  font-size:14.5px; line-height:1.5; word-break:break-word;
  position:relative; cursor:pointer; user-select:none; transition:filter .15s;
}
.bbl:active{filter:brightness(.8)}
.row.them .bbl { background:var(--them); color:var(--text); border-bottom-left-radius:5px; }
.row.me .bbl   { background:var(--grad); color:#fff; border-bottom-right-radius:5px; }
.row.me.mid .bbl  { border-radius:var(--r); border-bottom-right-radius:6px; border-top-right-radius:6px; }
.row.me.top .bbl  { border-radius:var(--r); border-bottom-right-radius:6px; }
.row.me.bot .bbl  { border-radius:var(--r); border-top-right-radius:6px; }
.row.them.mid .bbl{ border-radius:var(--r); border-bottom-left-radius:6px; border-top-left-radius:6px; }
.row.them.top .bbl{ border-radius:var(--r); border-bottom-left-radius:6px; }
.row.them.bot .bbl{ border-radius:var(--r); border-top-left-radius:6px; }
.row.me.mid,.row.me.top,.row.them.mid,.row.them.top { margin-bottom:1px; }

.bbl.imgb { padding:3px; background:transparent !important; }
.bbl.imgb img { max-width:220px; border-radius:18px; display:block; }

/* REPLY TAG */
.rtag {
  font-size:12px; opacity:.65; margin-bottom:6px;
  padding:5px 10px; border-left:2px solid rgba(255,255,255,.45);
  border-radius:5px; background:rgba(255,255,255,.08);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px;
}
.row.them .bbl .rtag { border-left-color:rgba(255,255,255,.25); background:rgba(255,255,255,.05); }

/* REACTION */
.rbadge {
  position:absolute; bottom:-11px; font-size:14px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:1px 6px; line-height:1.5; cursor:pointer; z-index:2;
}
.row.me .rbadge { right:6px; }
.row.them .rbadge { left:6px; }

/* TS */
.ts { font-size:10px; color:var(--muted); text-align:center; margin:6px 0 2px; }

/* SEEN */
.srow {
  display:flex; justify-content:flex-end; align-items:center;
  gap:4px; padding-right:2px; font-size:11px; color:var(--muted); margin-top:3px;
}

/* REACTION PICKER */
#rpick {
  position:fixed; display:none; background:var(--surface);
  border:1px solid var(--border); border-radius:30px; padding:8px 12px;
  gap:10px; font-size:24px; z-index:50;
  box-shadow:0 8px 32px rgba(0,0,0,.8); animation:popIn .18s cubic-bezier(.34,1.56,.64,1);
}
#rpick.on { display:flex; }
.ropt { cursor:pointer; transition:transform .15s; line-height:1; }
.ropt:hover { transform:scale(1.4); }

/* REPLY BANNER */
#rbanner {
  display:none; align-items:center; gap:10px;
  padding:8px 16px; background:var(--surface);
  border-top:1px solid var(--border); font-size:13px; color:var(--muted);
  flex-shrink:0; animation:slideUp .2s ease;
}
@keyframes slideUp { from{transform:translateY(8px);opacity:0} to{transform:translateY(0);opacity:1} }
#rbanner.on { display:flex; }
#rtxt { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
#rtxt strong { color:var(--text); }
.xbtn { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:0; }

/* EMOJI PANEL */
#epanel {
  display:none; flex-wrap:wrap; gap:6px;
  padding:12px 14px; background:var(--surface);
  border-top:1px solid var(--border); max-height:160px; overflow-y:auto; flex-shrink:0;
}
#epanel.on { display:flex; }
.ep { font-size:22px; cursor:pointer; transition:transform .1s; }
.ep:hover { transform:scale(1.25); }

/* INPUT */
#iarea {
  display:flex; align-items:flex-end; gap:10px;
  padding:10px 12px 16px; background:var(--bg);
  border-top:1px solid var(--border); flex-shrink:0;
}
.iwrap {
  flex:1; display:flex; align-items:flex-end;
  background:var(--surface); border:1.5px solid var(--border);
  border-radius:24px; padding:8px 14px; gap:8px; transition:border-color .2s;
}
.iwrap:focus-within { border-color:#555; }
#minput {
  flex:1; background:none; border:none; outline:none;
  color:var(--text); font-size:14.5px; resize:none;
  line-height:1.45; max-height:100px; font-family:inherit;
}
#minput::placeholder { color:var(--muted); }
.ibtn { background:none; border:none; color:var(--muted); font-size:22px; cursor:pointer; padding:0; line-height:1; flex-shrink:0; transition:color .2s; }
.ibtn:hover { color:var(--text); }
.imglbl { font-size:22px; cursor:pointer; color:var(--muted); line-height:1; flex-shrink:0; transition:color .2s; }
.imglbl:hover { color:var(--text); }
#fimg { display:none; }
#sbtn {
  background:none; border:none; cursor:pointer; font-size:28px; line-height:1;
  flex-shrink:0; padding:4px; transition:transform .15s,opacity .15s;
  opacity:.3; pointer-events:none;
}
#sbtn.on { opacity:1; pointer-events:auto; }
#sbtn.on:hover { transform:scale(1.12); }
#sbtn.on:active { transform:scale(.92); }

/* HEART */
.hfl {
  position:fixed; font-size:34px; pointer-events:none; z-index:999;
  animation:floatUp .85s ease forwards;
}
@keyframes floatUp {
  0%{opacity:1;transform:scale(.4) translateY(0)}
  60%{opacity:1;transform:scale(1.2) translateY(-50px)}
  100%{opacity:0;transform:scale(.9) translateY(-90px)}
}

/* TOAST */
#toast {
  position:fixed; bottom:90px; left:50%; transform:translateX(-50%);
  background:var(--surface); border:1px solid var(--border);
  border-radius:20px; padding:8px 18px; font-size:13px; color:var(--text);
  z-index:200; opacity:0; pointer-events:none; transition:opacity .3s; white-space:nowrap;
}
#toast.on { opacity:1; }
</style>
</head>
<body>

<!-- ══════ LOGIN ══════ -->
<div id="loginScreen">
  <div class="ll">💖</div>
  <div class="lt">Gaurav &amp; Bidhisha</div>
  <div class="ls">Enter the secret password</div>
  <div class="lcard">
    <div>
      <div class="llbl">Password</div>
      <div class="liw">
        <input class="linput" id="pwInput" type="password" placeholder="Enter password…" autocomplete="off"/>
        <button class="eyeb" id="eyeBtn">👁</button>
      </div>
    </div>
    <button class="lbtn" id="loginBtn">Enter 💕</button>
    <div class="lerr" id="loginErr"></div>
  </div>
</div>

<!-- ══════ APP ══════ -->
<div id="app">

  <div id="hdr">
    <div class="av" id="hav">?<div class="odot"></div></div>
    <div class="hi">
      <div class="hn" id="hname">Chat</div>
      <div class="hs">Active now ✦</div>
    </div>
    <div class="hicons">
      <button class="hbtn">📞</button>
      <button class="hbtn">📹</button>
    </div>
  </div>

  <div id="chat"><div class="ddiv">Today</div></div>

  <div id="rbanner">
    <span>↩</span>
    <div id="rtxt">Replying to <strong id="rlbl"></strong></div>
    <button class="xbtn" id="cancelR">✕</button>
  </div>

  <div id="epanel"></div>

  <div id="iarea">
    <div class="iwrap">
      <button class="ibtn" id="etoggle">😊</button>
      <textarea id="minput" placeholder="Message…" rows="1"></textarea>
      <label class="imglbl" title="Send photo">📷<input type="file" id="fimg" accept="image/*"/></label>
    </div>
    <button id="sbtn">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="15" r="15" fill="url(#sg)"/>
        <path d="M8.5 15l13-5-5 5 5 5-13-5z" fill="white"/>
        <defs>
          <linearGradient id="sg" x1="0" y1="0" x2="30" y2="30">
            <stop offset="0%" stop-color="#833ab4"/>
            <stop offset="50%" stop-color="#fd1d1d"/>
            <stop offset="100%" stop-color="#fcb045"/>
          </linearGradient>
        </defs>
      </svg>
    </button>
  </div>
</div>

<!-- REACTION PICKER -->
<div id="rpick">
  <span class="ropt" data-r="❤️">❤️</span>
  <span class="ropt" data-r="😂">😂</span>
  <span class="ropt" data-r="😮">😮</span>
  <span class="ropt" data-r="😢">😢</span>
  <span class="ropt" data-r="🔥">🔥</span>
  <span class="ropt" data-r="👏">👏</span>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ── FIREBASE CONFIG – replace with yours ── */
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};
const fb  = initializeApp(firebaseConfig);
const db  = getFirestore(fb);

/* ── PASSWORD LOGIC ── */
const PASSWORD = "gaurav";  // ← YOUR password here
let me = null;

const $  = id => document.getElementById(id);
const ls = $("loginScreen"), appEl = $("app");
const pwInput = $("pwInput"), loginBtn = $("loginBtn"), loginErr = $("loginErr");

$("eyeBtn").onclick = () => pwInput.type = pwInput.type === "password" ? "text" : "password";

function doLogin() {
  const v = pwInput.value.trim();
  if (!v) { showErr("Please enter the password."); return; }
  me = v === PASSWORD ? "Gaurav" : "Bidhisha";
  loginErr.textContent = "";
  ls.style.opacity = "0"; ls.style.transition = "opacity .3s";
  setTimeout(() => {
    ls.style.display = "none";
    appEl.classList.add("on");
    const other = me === "Gaurav" ? "Bidhisha" : "Gaurav";
    $("hav").childNodes[0].textContent = other[0];
    $("hname").textContent = other + " 💕";
    initEmojis();
    startListener();
  }, 300);
}

function showErr(msg) {
  loginErr.textContent = msg;
  loginErr.style.animation = "none";
  requestAnimationFrame(() => loginErr.style.animation = "");
}

loginBtn.onclick = doLogin;
pwInput.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

/* ── EMOJIS ── */
const EMOJIS = [
  "😀","😂","🥰","😍","😎","🥺","😭","🤩","😘","😅",
  "❤️","🔥","💕","💖","💯","✨","🎉","😊","🤔","😏",
  "💀","👀","🙈","🤣","😇","🥳","😜","🤯","💪","👑",
  "🌹","🦋","🌙","⭐","🍓","🎶","🕊️","🫶","💌","🧸",
  "😈","🫠","😴","🥵","🫦","💋","🤌","🫰","👻","🎀"
];

function initEmojis() {
  const ep = $("epanel");
  EMOJIS.forEach(em => {
    const s = document.createElement("span");
    s.className = "ep"; s.textContent = em;
    s.onclick = () => {
      const p = minput.selectionStart, v = minput.value;
      minput.value = v.slice(0,p) + em + v.slice(p);
      minput.selectionStart = minput.selectionEnd = p + em.length;
      minput.focus(); updSend();
    };
    ep.appendChild(s);
  });
}

/* ── STATE ── */
let replyTo = null, reactDocId = null, emojiOpen = false, holdTimer = null;

const chat    = $("chat");
const minput  = $("minput");
const sbtn    = $("sbtn");
const rbanner = $("rbanner");
const rlbl    = $("rlbl");
const rpick   = $("rpick");
const toast   = $("toast");

/* input grow */
function updSend() { sbtn.classList.toggle("on", minput.value.trim().length > 0); }
minput.addEventListener("input", () => {
  minput.style.height = "auto";
  minput.style.height = Math.min(minput.scrollHeight, 100) + "px";
  updSend();
});
minput.addEventListener("keydown", e => { if (e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();} });

/* emoji toggle */
$("etoggle").onclick = () => { emojiOpen=!emojiOpen; $("epanel").classList.toggle("on",emojiOpen); };

/* cancel reply */
$("cancelR").onclick = () => { replyTo=null; rbanner.classList.remove("on"); };

/* reaction picker options */
document.querySelectorAll(".ropt").forEach(btn => {
  btn.onclick = async () => {
    if (!reactDocId) return;
    await updateDoc(doc(db,"messages",reactDocId), { reaction: btn.dataset.r });
    rpick.classList.remove("on"); reactDocId=null;
  };
});
document.addEventListener("click", e => {
  if (!rpick.contains(e.target)) { rpick.classList.remove("on"); reactDocId=null; }
});

/* image upload */
$("fimg").addEventListener("change", async () => {
  const file = $("fimg").files[0];
  if (!file || !me) return;
  const reader = new FileReader();
  reader.onload = async e2 => {
    await addDoc(collection(db,"messages"), {
      type:"image", imageData:e2.target.result,
      user:me, reply:replyTo||null, reaction:null, time:Date.now()
    });
    replyTo=null; rbanner.classList.remove("on");
  };
  reader.readAsDataURL(file);
  $("fimg").value="";
});

/* send */
window.sendMsg = async function() {
  if (!me) return;
  const text = minput.value.trim();
  if (!text) return;
  await addDoc(collection(db,"messages"), {
    type:"text", text, user:me,
    reply:replyTo||null, reaction:null, time:Date.now()
  });
  minput.value=""; minput.style.height="auto"; sbtn.classList.remove("on");
  replyTo=null; rbanner.classList.remove("on");
  emojiOpen=false; $("epanel").classList.remove("on");
};
sbtn.onclick = () => sendMsg();

/* heart */
function spawnHeart(x,y) {
  const h=document.createElement("div"); h.className="hfl"; h.textContent="❤️";
  h.style.left=(x-17)+"px"; h.style.top=(y-17)+"px";
  document.body.appendChild(h); setTimeout(()=>h.remove(),900);
}

function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
}

function showToast(msg) {
  toast.textContent=msg; toast.classList.add("on");
  setTimeout(()=>toast.classList.remove("on"),2000);
}

/* ── FIRESTORE LISTENER ── */
function startListener() {
  const q = query(collection(db,"messages"), orderBy("time"));
  let firstLoad = true;

  onSnapshot(q, snap => {
    chat.innerHTML = '<div class="ddiv">Today</div>';
    const msgs = [];
    snap.forEach(d => msgs.push({id:d.id,...d.data()}));

    msgs.forEach((msg,i) => {
      // KEY FIX: always compare msg.user to the logged-in user (me)
      // Gaurav's messages → right (me), Bidhisha's messages → left (them)
      const isMe = (msg.user === me);
      const side = isMe ? "me" : "them";
      const prev = msgs[i-1], next = msgs[i+1];
      const sp   = prev && prev.user===msg.user;
      const sn   = next && next.user===msg.user;
      const pos  = sp&&sn?"mid":sp?"bot":sn?"top":"solo";

      /* timestamp between groups */
      if (!sp) {
        const ts=document.createElement("div");
        ts.className="ts"; ts.textContent=fmtTime(msg.time);
        chat.appendChild(ts);
      }

      /* row — skip pop-in animation on first load so history shows instantly */
      const row=document.createElement("div");
      row.className=`row ${side} ${pos}`;
      if (firstLoad) row.style.animation = "none";

      /* avatar for them side only */
      if (!isMe) {
        const av=document.createElement("div");
        av.className="av sm";
        av.textContent=msg.user[0];
        av.style.visibility=sn?"hidden":"visible";
        row.appendChild(av);
      }

      /* bubble */
      const bbl=document.createElement("div");
      bbl.className="bbl"+(msg.type==="image"?" imgb":"");

      if (msg.reply) {
        const rt=document.createElement("div");
        rt.className="rtag"; rt.textContent="↩ "+msg.reply;
        bbl.appendChild(rt);
      }

      if (msg.type==="image") {
        const img=document.createElement("img");
        img.src=msg.imageData; img.alt="photo"; bbl.appendChild(img);
      } else {
        bbl.appendChild(document.createTextNode(msg.text||""));
      }

      if (msg.reaction) {
        const rb=document.createElement("div");
        rb.className="rbadge"; rb.textContent=msg.reaction;
        rb.onclick=e=>e.stopPropagation(); bbl.appendChild(rb);
      }

      /* single tap → set reply + heart  |  double-tap → ❤️ react */
      let lastTap=0;
      bbl.addEventListener("click", e => {
        const now=Date.now();
        if (now-lastTap<320) {
          updateDoc(doc(db,"messages",msg.id),{reaction:"❤️"});
          spawnHeart(e.clientX,e.clientY); lastTap=0; return;
        }
        lastTap=now;
        const content=msg.type==="image"?"📷 Photo":(msg.text||"");
        replyTo=content;
        rlbl.textContent=`"${content.slice(0,30)}${content.length>30?'…':''}"`;
        rbanner.classList.add("on"); minput.focus();
        spawnHeart(e.clientX,e.clientY);
      });

      /* long press → reaction picker */
      bbl.addEventListener("pointerdown", () => {
        holdTimer=setTimeout(()=>{
          reactDocId=msg.id;
          const bnd=bbl.getBoundingClientRect();
          rpick.style.left=Math.max(8,Math.min(bnd.left,window.innerWidth-260))+"px";
          rpick.style.top =Math.max(8,bnd.top-62)+"px";
          rpick.classList.add("on");
        },520);
      });
      ["pointerup","pointerleave","pointermove"].forEach(ev=>bbl.addEventListener(ev,()=>clearTimeout(holdTimer)));

      row.appendChild(bbl);
      chat.appendChild(row);
    });

    /* seen row — only show under your own last message */
    if (msgs.length) {
      const last = msgs[msgs.length-1];
      if (last.user === me) {
        const sr=document.createElement("div"); sr.className="srow";
        const other=me==="Gaurav"?"Bidhisha":"Gaurav";
        const sav=document.createElement("div");
        sav.className="av sm";
        sav.style.cssText="width:14px;height:14px;font-size:7px;flex-shrink:0";
        sav.textContent=other[0];
        sr.appendChild(sav);
        sr.appendChild(document.createTextNode(" Seen"));
        chat.appendChild(sr);
      }
    }

    chat.scrollTop=chat.scrollHeight;
    firstLoad = false;
  });
}
</script>
</body>
</html>
