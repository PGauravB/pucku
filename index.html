<!DOCTYPE html>
<html>
<head>
  <title>TTS Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input {
      width: 70%;
      padding: 10px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      background: #00ffcc;
      color: #000;
      margin-left: 10px;
      cursor: pointer;
    }

    #messages {
      margin-top: 20px;
      max-height: 300px;
      overflow-y: auto;
    }

    .msg {
      margin: 5px;
      padding: 8px;
      background: #111;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <h2>🔊 Live TTS Chat</h2>

  <input id="msgInput" placeholder="Type message...">
  <button onclick="sendMsg()">Send</button>

  <div id="messages"></div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyA3fWq3U4yXfH7Lq1VmMFOWC285t_tsbVg",
      authDomain: "puchku-740b1.firebaseapp.com",
      projectId: "puchku-740b1",
      storageBucket: "puchku-740b1.firebasestorage.app",
      messagingSenderId: "777932737041",
      appId: "1:777932737041:web:214ea01432011da9bbffb0"
    };

    // Init Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Send message
    function sendMsg() {
      const input = document.getElementById("msgInput");
      const text = input.value.trim();

      if (text === "") return;

      db.collection("messages").add({
        text: text,
        time: Date.now()
      });

      input.value = "";
    }

    // Listen for messages
    db.collection("messages")
      .orderBy("time")
      .onSnapshot(snapshot => {
        snapshot.docChanges().forEach(change => {
          if (change.type === "added") {
            const data = change.doc.data();

            // Show on screen
            const div = document.createElement("div");
            div.className = "msg";
            div.innerText = data.text;
            document.getElementById("messages").appendChild(div);

            // Speak it
            speak(data.text);
          }
        });
      });

    // TTS function
    function speak(text) {
      const speech = new SpeechSynthesisUtterance(text);
      speech.lang = "en-US";
      speech.pitch = 1;
      speech.rate = 1;
      speechSynthesis.speak(speech);
    }
  </script>

</body>
</html>
