<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaurav ❤️ Bidhisha</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffdee9, #ffc0cb);
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
#header {
  text-align: center;
  padding: 10px;
  background: #ff4d6d;
  color: white;
  font-weight: bold;
}

/* CHAT AREA */
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

/* MESSAGE */
.msg {
  margin: 6px 0;
  padding: 10px 14px;
  border-radius: 15px;
  max-width: 70%;
  position: relative;
  word-wrap: break-word;
}

/* LEFT (Bidhisha) */
.left {
  background: #fff;
  align-self: flex-start;
}

/* RIGHT (Gaurav) */
.right {
  background: #ff4d6d;
  color: white;
  align-self: flex-end;
}

/* REPLY TAG */
.reply {
  font-size: 12px;
  opacity: 0.7;
  margin-bottom: 4px;
}

/* INPUT AREA */
#inputArea {
  display: flex;
  padding: 10px;
  background: #fff0f5;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 20px;
  outline: none;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  border: none;
  border-radius: 20px;
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

/* USER SELECT */
#userSelect {
  margin: 10px;
  padding: 8px;
  border-radius: 10px;
  border: none;
}
</style>
</head>
<body>

<div id="header">💖 Gaurav & Bidhisha 💖</div>

<select id="userSelect">
  <option value="Gaurav">Gaurav</option>
  <option value="Bidhisha">Bidhisha</option>
</select>

<div id="chat"></div>

<div id="inputArea">
  <input id="msgInput" placeholder="Type message..." />
  <button onclick="sendMsg()">Send ❤️</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const chatDiv = document.getElementById("chat");

let replyTo = null;

// LISTEN
const q = query(collection(db, "messages"), orderBy("time"));

onSnapshot(q, (snapshot) => {
  chatDiv.innerHTML = "";

  snapshot.forEach(doc => {
    const msg = doc.data();

    const div = document.createElement("div");
    div.className = "msg " + (msg.user === "Gaurav" ? "right" : "left");

    // reply preview
    if (msg.reply) {
      const replyDiv = document.createElement("div");
      replyDiv.className = "reply";
      replyDiv.textContent = "↩ " + msg.reply;
      div.appendChild(replyDiv);
    }

    div.appendChild(document.createTextNode(msg.text));

    // click to reply
    div.onclick = () => {
      replyTo = msg.text;
      document.getElementById("msgInput").placeholder = "Replying to: " + msg.text;
    };

    chatDiv.appendChild(div);
  });

  chatDiv.scrollTop = chatDiv.scrollHeight;
});

// SEND
window.sendMsg = async function () {
  const input = document.getElementById("msgInput");
  const user = document.getElementById("userSelect").value;
  const text = input.value.trim();

  if (!text) return;

  await addDoc(collection(db, "messages"), {
    text: text,
    user: user,
    reply: replyTo || null,
    time: Date.now()
  });

  input.value = "";
  input.placeholder = "Type message...";
  replyTo = null;
};

// ENTER TO SEND
document.getElementById("msgInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMsg();
});
</script>

</body>
</html>
